<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevTools Pro · 开发者工具集锦</title>
<style>
:root {
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-tertiary: #21262d;
  --bg-hover: #30363d;
  --border: #30363d;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #6e7681;
  --accent: #58a6ff;
  --accent-hover: #79c0ff;
  --accent-green: #3fb950;
  --accent-red: #f85149;
  --accent-orange: #d29922;
  --accent-purple: #bc8cff;
  --shadow: 0 8px 24px rgba(0,0,0,.4);
  --radius: 8px;
  --radius-sm: 4px;
  --sidebar-w: 220px;
  --header-h: 52px;
  --font: -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  --mono: "SF Mono","Cascadia Code","Fira Code","Consolas",monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);background:var(--bg-primary);color:var(--text-primary);font-size:14px;line-height:1.5;display:flex;flex-direction:column}
/* scrollbar */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg-hover);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;height:var(--header-h);padding:0 20px;border-bottom:1px solid var(--border);background:var(--bg-secondary);flex-shrink:0}
.header h1{font-size:16px;font-weight:600;letter-spacing:.3px;display:flex;align-items:center;gap:8px}
.header h1 span{color:var(--accent)}
.lang-toggle{display:flex;gap:0;background:var(--bg-tertiary);border-radius:var(--radius-sm);overflow:hidden;cursor:pointer;border:1px solid var(--border)}
.lang-btn{padding:4px 12px;font-size:12px;font-weight:500;transition:all .15s;user-select:none;border:none;background:transparent;color:var(--text-secondary);cursor:pointer;font-family:var(--font)}
.lang-btn.active{background:var(--accent);color:#fff}
.lang-btn:not(.active):hover{color:var(--text-primary)}

/* Layout */
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:var(--sidebar-w);background:var(--bg-secondary);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;padding:8px 0}
.sidebar-group{padding:0 8px;margin-bottom:4px}
.sidebar-group-title{padding:6px 12px 4px;font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
.sidebar-item{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:all .12s;color:var(--text-secondary);font-size:13px;user-select:none}
.sidebar-item:hover{background:var(--bg-hover);color:var(--text-primary)}
.sidebar-item.active{background:var(--bg-tertiary);color:var(--accent);font-weight:500}
.sidebar-item .icon{width:18px;text-align:center;font-size:14px;flex-shrink:0}

/* Main */
.main{flex:1;overflow-y:auto;padding:20px 24px 40px}
.tool-panel{display:none;animation:fadeIn .2s ease}
.tool-panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

.tool-header{margin-bottom:20px}
.tool-title{font-size:22px;font-weight:600;margin-bottom:4px}
.tool-desc{color:var(--text-secondary);font-size:13px}

/* Form elements */
label{display:block;margin-bottom:4px;font-size:12px;font-weight:500;color:var(--text-secondary)}
input,textarea,select{width:100%;padding:8px 12px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-primary);font-size:13px;font-family:var(--font);transition:border .15s;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:80px;font-family:var(--mono);font-size:12px;line-height:1.6}
input[type="text"]{font-family:var(--mono);font-size:12px}
.row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.row>*{flex:1;min-width:140px}
.col{display:flex;flex-direction:column;gap:12px;margin-bottom:12px}

.btn{padding:6px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-tertiary);color:var(--text-primary);cursor:pointer;font-size:12px;font-weight:500;transition:all .12s;display:inline-flex;align-items:center;gap:6px;font-family:var(--font)}
.btn:hover{background:var(--bg-hover);border-color:var(--text-muted)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent-hover);border-color:var(--accent-hover)}
.btn-success{background:var(--accent-green);color:#fff;border-color:var(--accent-green)}
.btn-danger{background:var(--accent-red);color:#fff;border-color:var(--accent-red)}
.btn-sm{padding:3px 10px;font-size:11px}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}

.result-box{background:var(--bg-tertiary);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;font-family:var(--mono);font-size:12px;line-height:1.6;overflow-x:auto;white-space:pre-wrap;word-break:break-all;min-height:36px;margin-bottom:12px;position:relative}
.result-box .copy-btn{position:absolute;top:6px;right:6px}
.copy-btn{opacity:0;transition:opacity .15s}
.result-box:hover .copy-btn,.copy-btn.show{opacity:1}

.error-msg{color:var(--accent-red);font-size:12px;margin-top:4px;display:none}
.error-msg.show{display:block}
.success-msg{color:var(--accent-green);font-size:12px;margin-top:4px;display:none}
.success-msg.show{display:block}

/* Color swatch */
.color-preview{width:100%;height:60px;border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:12px;transition:background .15s}

/* Checkbox / toggle */
.checkbox-group{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px}
.checkbox-group label{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary);cursor:pointer}
.checkbox-group input[type="checkbox"]{width:auto;cursor:pointer}

/* Case converter output */
.case-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:6px 10px;background:var(--bg-tertiary);border-radius:var(--radius-sm);border:1px solid var(--border)}
.case-label{width:120px;font-size:11px;font-weight:600;color:var(--text-muted);flex-shrink:0;text-align:right}
.case-value{flex:1;font-family:var(--mono);font-size:12px;word-break:break-all;color:var(--text-primary)}
.case-value .btn{flex-shrink:0}

/* Timestamp info */
.ts-info{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.ts-info .ts-card{background:var(--bg-tertiary);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center}
.ts-info .ts-card .val{font-size:18px;font-weight:600;font-family:var(--mono);color:var(--accent)}
.ts-info .ts-card .lbl{font-size:11px;color:var(--text-muted);margin-top:2px}

/* Number base */
.base-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.base-item{padding:10px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:var(--radius-sm)}
.base-item .base-label{font-size:11px;color:var(--text-muted);margin-bottom:2px}
.base-item .base-val{font-family:var(--mono);font-size:13px;word-break:break-all}
.base-item .base-val .btn{vertical-align:middle}

/* UUID list */
.uuid-list{max-height:200px;overflow-y:auto}
.uuid-item{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;font-family:var(--mono);font-size:11px;border-bottom:1px solid var(--border);gap:8px}
.uuid-item:last-child{border-bottom:none}
.uuid-item .uuid-text{flex:1;word-break:break-all}

/* responsive */
@media(max-width:768px){
  .layout{flex-direction:column}
  .sidebar{width:100%;max-height:180px;border-right:none;border-bottom:1px solid var(--border)}
  .sidebar-group{display:flex;flex-wrap:wrap;gap:2px}
  .sidebar-group-title{display:none}
  .sidebar-item{padding:5px 10px;font-size:12px}
  .main{padding:12px 16px 80px}
  .ts-info,.base-grid{grid-template-columns:1fr}
  .case-row{flex-wrap:wrap}
  .case-label{width:100%;text-align:left}
  .row{flex-direction:column}
  .row>*{min-width:auto}
}
</style>
</head>

function t(key) {
  const keys = key.split('.');
  let o = I18N[lang];
  for (const k of keys) if (o) o = o[k];
  return o || key;
}

function setLang(l) {
  lang = l;

  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === l));

  renderCurrentTool();
}

  function ii(a,b,c,d,x,s,t){return cmn(c^(b|~d),a,b,x,s,t)}
  function bitRol(v,c){return v<<c|v>>>32-c}
  function add32(a,b){return a+b&0xffffffff}
  function str2binl(s){let r=Array(s.length>>2);for(let i=0;i<r.length;i++)r[i]=0;for(let i=0;i<s.length*8;i+=8)r[i>>5]|=(s.charCodeAt(i/8)&0xff)<<i%32;return r}
  function binl2hex(a){let h='0123456789abcdef';let r='';for(let i=0;i<a.length*4;i++){r+=h.charAt(a[i>>2]>>i%4*8+4&0xf)+h.charAt(a[i>>2]>>i%4*8&0xf)}return r}
  let x=str2binl(unescape(encodeURIComponent(s)));let a=1732584193;let b=-271733879;let c=-1732584194;let d=271733878;let l=x.length*32;x[l>>5]|=0x80<<l%32;x[((l+64>>>9)<<4)+14]=l;let N=x.length;for(let i=0;i<N;i+=16){md5cycle(x.slice(i,i+16),[a,b,c,d]);a=add32(a,0);b=add32(b,0);c=add32(c,0);d=add32(d,0)}return binl2hex([a,b,c,d]);
}

// ==================== Hash via Web Crypto ====================
async function hashText(text, algo) {
  if (algo === 'md5') return md5(text);
  const name = algo === 'sha1' ? 'SHA-1' : algo === 'sha256' ? 'SHA-256' : 'SHA-512';
  const buf = new TextEncoder().encode(text);
  const digest = await crypto.subtle.digest(name, buf);
  return Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ==================== Helpers ====================
function copyText(text, btn) {
  if (!text) return;
  if (navigator.clipboard) navigator.clipboard.writeText(text);
  else { const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); }
  const orig = btn.textContent;
  btn.textContent = t('ui.copied');
  btn.style.opacity = '1';
  setTimeout(() => { btn.textContent = orig; btn.style.opacity = ''; }, 1200);
}

function bindColor() {
  const inp=document.getElementById('colorInput'),preview=document.getElementById('colorPreview'),errEl=document.getElementById('colorErr');
  const hexEl=document.getElementById('colorHex'),rgbEl=document.getElementById('colorRgb'),hslEl=document.getElementById('colorHsl');
  function parseColor(s){
    s=s.trim();
    let r,g,b;
    // hex
    let m=s.match(/^#?([0-9a-f]{3,8})$/i);
    if(m){
      let h=m[1];
      if(h.length===3||h.length===4){h=h.split('').map(c=>c+c).join('')}
      if(h.length===6)r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
      else if(h.length===8)r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
      if(r!=null&&!isNaN(r))return{r,g,b};
    }
    // rgb / rgba
    m=s.match(/^rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/i);
    if(m){r=+m[1];g=+m[2];b=+m[3];if(r<=255&&g<=255&&b<=255)return{r,g,b};}
    // hsl / hsla
    m=s.match(/^hsla?\(\s*(\d+)\s*,\s*(\d+)%\s*,\s*(\d+)%/i);
    if(m){let h=+m[1]/360,s=+m[2]/100,l=+m[3]/100;let c=(1-Math.abs(2*l-1))*s,x=c*(1-Math.abs(h*6%2-1)),m2=l-c/2;[r,g,b]=[[c,x,0],[x,c,0],[0,c,x],[0,x,c],[x,0,c],[c,0,x]][Math.floor(h*6)%6];r=Math.round((r+m2)*255);g=Math.round((g+m2)*255);b=Math.round((b+m2)*255);return{r,g,b};}
    return null;
  }
  function rgb2hsl(r,g,b){r/=255;g/=255;b/=255;let M=Math.max(r,g,b),m=Math.min(r,g,b),d=M-m,l=(M+m)/2;if(d===0)return[0,0,Math.round(l*100)];let s=d/(1-Math.abs(2*l-1));let h;if(M===r)h=((g-b)/d)%6;else if(M===g)h=(b-r)/d+2;else h=(r-g)/d+4;return[Math.round(h*60+360)%360,Math.round(s*100),Math.round(l*100)];}
  function update(){
    clearErr(errEl);const p=parseColor(inp.value);
    if(!p){err(errEl,t('ui.invalid_color'));return;}
    const hex='#'+[p.r,p.g,p.b].map(v=>v.toString(16).padStart(2,'0')).join('');
    const rgb=`rgb(${p.r},${p.g},${p.b})`;
    const hslArr=rgb2hsl(p.r,p.g,p.b);const hsl=`hsl(${hslArr[0]},${hslArr[1]}%,${hslArr[2]}%)`;
    preview.style.background=hex;
    hexEl.innerHTML=hex+' <button class="btn btn-sm" data-copy="colorHex">'+t('ui.copy')+'</button>';
    rgbEl.innerHTML=rgb+' <button class="btn btn-sm" data-copy="colorRgb">'+t('ui.copy')+'</button>';
    hslEl.innerHTML=hsl+' <button class="btn btn-sm" data-copy="colorHsl">'+t('ui.copy')+'</button>';
    document.querySelectorAll('#colorOutput [data-copy]').forEach(b=>b.onclick=()=>copyText(b.parentElement.textContent.replace(t('ui.copy'),'').trim(),b));
  }
  inp.addEventListener('input',update);
  update();
}

  const inp=document.getElementById('caseInput'),out=document.getElementById('caseOutput');
  const LABELS=['camel','pascal','snake','kebab','upper','lower','title','dot'];
  function convert(s){
    if(!s.trim()){out.innerHTML='';return;}
    // split into words
    const words=s.match(/[A-Za-z0-9]+/g)||[s];
    const lower=words.map(w=>w.toLowerCase());
    const upper=words.map(w=>w.toUpperCase());
    const cap=words.map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase());
    const results={
      camel: lower[0]+cap.slice(1).join(''),
      pascal: cap.join(''),
      snake: lower.join('_'),
      kebab: lower.join('-'),
      upper: upper.join('_'),
      lower: lower.join(' '),
      title: cap.join(' '),
      dot: lower.join('.'),
    };
    out.innerHTML=LABELS.map(k=>`<div class="case-row"><span class="case-label">${t('ui.case_'+k)}</span><span class="case-value">${results[k]} <button class="btn btn-sm">${t('ui.copy')}</button></span></div>`).join('');
    out.querySelectorAll('.case-row .btn').forEach((btn,i)=>{btn.onclick=()=>copyText(results[LABELS[i]],btn);});
  }
  inp.addEventListener('input',()=>convert(inp.value));
  convert(inp.value);
}

// --- Base ---
function toolBase() {
  return `
    <div class="tool-header"><div class="tool-title">${t('tools.base.name')}</div><div class="tool-desc">${t('tools.base.desc')}</div></div>
    <label>${t('ui.input')}</label>
    <input type="text" id="baseInput" placeholder="${t('ui.placeholder_num')}" value="255">
    <div class="error-msg" id="baseErr"></div>
    <div class="base-grid" id="baseOutput">
      <div class="base-item"><div class="base-label">${t('ui.hex')} (16)</div><div class="base-val" id="base16">ff <button class="btn btn-sm">${t('ui.copy')}</button></div></div>
      <div class="base-item"><div class="base-label">${t('ui.dec')} (10)</div><div class="base-val" id="base10">255 <button class="btn btn-sm">${t('ui.copy')}</button></div></div>
      <div class="base-item"><div class="base-label">${t('ui.oct')} (8)</div><div class="base-val" id="base8">377 <button class="btn btn-sm">${t('ui.copy')}</button></div></div>
      <div class="base-item"><div class="base-label">${t('ui.bin')} (2)</div><div class="base-val" id="base2">11111111 <button class="btn btn-sm">${t('ui.copy')}</button></div></div>
    </div>`;
}
function bindBase() {
  const inp=document.getElementById('baseInput'),errEl=document.getElementById('baseErr');
  const ids={16:'base16',10:'base10',8:'base8',2:'base2'};
  function update(){
    clearErr(errEl);const s=inp.value.trim();
    if(!s)return;let num;
    if(/^0x/i.test(s))num=BigInt(s);
    else if(/^0b/i.test(s))num=BigInt(s);
    else if(/^0o/i.test(s))num=BigInt(s);
    else{try{num=BigInt(s);}catch{try{num=BigInt(Math.round(parseFloat(s)));}catch{err(errEl,t('ui.invalid_ts'));return}}}
    const vals={16:num.toString(16),10:num.toString(10),8:num.toString(8),2:num.toString(2)};
    for(const [base,id] of Object.entries(ids)){
      const el=document.getElementById(id);
      el.innerHTML=vals[base]+' <button class="btn btn-sm">'+t('ui.copy')+'</button>';
      el.querySelector('.btn').onclick=()=>copyText(vals[base],el.querySelector('.btn'));
    }
  }
  inp.addEventListener('input',update);
  update();
}

// --- HTML Entities ---
function toolHTML() {
  return `
    <div class="tool-header"><div class="tool-title">${t('tools.html.name')}</div><div class="tool-desc">${t('tools.html.desc')}</div></div>
    <div class="btn-group">
      <button class="btn btn-primary" id="htmlEncode">${t('ui.encode')}</button>
      <button class="btn" id="htmlDecode">${t('ui.decode')}</button>
      <button class="btn" id="htmlClear">${t('ui.clear')}</button>
    </div>
    <label>${t('ui.input')}</label>
    <textarea id="htmlInput" rows="6" placeholder="${t('ui.placeholder_html')}"></textarea>
    <div class="error-msg" id="htmlErr"></div>
    <label>${t('ui.output')}</label>
    <div class="result-box" id="htmlResult"><span style="color:var(--text-muted)">${t('ui.result')}</span><button class="btn btn-sm copy-btn" id="htmlCopy">${t('ui.copy')}</button></div>`;
}
function bindHTML() {
  const inp=document.getElementById('htmlInput'),res=document.getElementById('htmlResult'),errEl=document.getElementById('htmlErr');
  const show=(v)=>{res.innerHTML=(v||'<span style=\"color:var(--text-muted)\">'+t('ui.result')+'</span>')+'<button class="btn btn-sm copy-btn show" id="htmlCopy">'+t('ui.copy')+'</button>';bindCopy('htmlCopy');};
  document.getElementById('htmlEncode').onclick=()=>{clearErr(errEl);show(inp.value.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'));};
  document.getElementById('htmlDecode').onclick=()=>{clearErr(errEl);try{const ta=document.createElement('textarea');ta.innerHTML=inp.value;show(ta.value);}catch(e){err(errEl,t('ui.error'));}};
  document.getElementById('htmlClear').onclick=()=>{inp.value='';show();clearErr(errEl);};
  function bindCopy(id){const el=document.getElementById(id);if(el)el.onclick=()=>copyText(res.textContent.replace(t('ui.copied'),'').trim(),el);}
  bindCopy('htmlCopy');
}

// --- JWT ---
function toolJWT() {
  return `
    <div class="tool-header"><div class="tool-title">${t('tools.jwt.name')}</div><div class="tool-desc">${t('tools.jwt.desc')}</div></div>
    <label>${t('ui.input')}</label>
    <textarea id="jwtInput" rows="4" placeholder="${t('ui.placeholder_token')}"></textarea>
    <div class="btn-group">
      <button class="btn btn-primary" id="jwtDecode">${t('ui.decode')}</button>
      <button class="btn" id="jwtClear">${t('ui.clear')}</button>
    </div>
    <div class="error-msg" id="jwtErr"></div>
    <label>${t('ui.jwt_header')}</label>
    <div class="result-box" id="jwtHeader"><span style="color:var(--text-muted)">${t('ui.result')}</span><button class="btn btn-sm copy-btn" id="jwtHeaderCopy">${t('ui.copy')}</button></div>
    <label>${t('ui.jwt_payload')}</label>
    <div class="result-box" id="jwtPayload"><span style="color:var(--text-muted)">${t('ui.result')}</span><button class="btn btn-sm copy-btn" id="jwtPayloadCopy">${t('ui.copy')}</button></div>
    <label>${t('ui.jwt_exp')}</label>
    <div class="result-box" id="jwtExp"><span style="color:var(--text-muted)">${t('ui.result')}</span></div>`;
}
function bindJWT() {
  const inp=document.getElementById('jwtInput'),errEl=document.getElementById('jwtErr');
  const hdr=document.getElementById('jwtHeader'),pay=document.getElementById('jwtPayload'),exp=document.getElementById('jwtExp');
  function decodeJWT(){
    clearErr(errEl);const s=inp.value.trim();if(!s){reset();return;}
    const parts=s.split('.');
    if(parts.length!==3){err(errEl,t('ui.invalid_token'));return;}
    try{
      const h=JSON.parse(atob(parts[0].replace(/-/g,'+').replace(/_/g,'/')));
      const p=JSON.parse(atob(parts[1].replace(/-/g,'+').replace(/_/g,'/')));
      hdr.innerHTML=JSON.stringify(h,null,2)+'<button class="btn btn-sm copy-btn show" id="jwtHeaderCopy">'+t('ui.copy')+'</button>';
      pay.innerHTML=JSON.stringify(p,null,2)+'<button class="btn btn-sm copy-btn show" id="jwtPayloadCopy">'+t('ui.copy')+'</button>';
      if(p.exp){const d=new Date(p.exp*1000);const now=Date.now();const diff=p.exp*1000-now;const txt=(diff>0?t('ui.expires_prefix')+d.toLocaleString()+t('ui.expires_mid')+formatDuration(diff/1000)+t('ui.expires_suffix'):t('ui.expires_prefix')+d.toLocaleString()+t('ui.expires_mid')+t('ui.jwt_expired'));exp.innerHTML=txt+'<button class="btn btn-sm copy-btn show">'+t('ui.copy')+'</button>';exp.querySelector('.btn').onclick=()=>copyText(txt,exp.querySelector('.btn'));}
      else exp.innerHTML='<span style="color:var(--text-muted)">N/A</span>';
      bindCopy('jwtHeaderCopy',()=>hdr.textContent.replace(t('ui.copied'),'').trim());
      bindCopy('jwtPayloadCopy',()=>pay.textContent.replace(t('ui.copied'),'').trim());
    }catch(e){err(errEl,t('ui.invalid_token'));reset();}
  }
  function reset(){hdr.innerHTML='<span style="color:var(--text-muted)">'+t('ui.result')+'</span>';pay.innerHTML='<span style="color:var(--text-muted)">'+t('ui.result')+'</span>';exp.innerHTML='<span style="color:var(--text-muted)">N/A</span>';}
  function formatDuration(s){const d=Math.floor(s/86400);s%=86400;const h=Math.floor(s/3600);s%=3600;const m=Math.floor(s/60);return(d?d+t('ui.remaining_days')+' ':'')+(h?h+t('ui.remaining_hours')+' ':'')+(m?m+t('ui.remaining_mins'):'');}
  function bindCopy(id,getText){const el=document.getElementById(id);if(el)el.onclick=()=>copyText(getText(),el);}
  document.getElementById('jwtDecode').onclick=decodeJWT;
  document.getElementById('jwtClear').onclick=()=>{inp.value='';reset();clearErr(errEl);};
}

// ==================== Tool render map ====================
const RENDER = {
  json:     { html: toolJSON,     bind: bindJSON },
  base64:   { html: toolBase64,   bind: bindBase64 },
  url:      { html: toolURL,      bind: bindURL },
  color:    { html: toolColor,    bind: bindColor },
  timestamp:{ html: toolTimestamp,bind: bindTimestamp },
  uuid:     { html: toolUUID,     bind: bindUUID },
  regex:    { html: toolRegex,    bind: bindRegex },
  hash:     { html: toolHash,     bind: bindHash },
  case:     { html: toolCase,     bind: bindCase },
  base:     { html: toolBase,     bind: bindBase },
  html:     { html: toolHTML,     bind: bindHTML },
  jwt:      { html: toolJWT,      bind: bindJWT },
};

// ==================== Main render ====================
function renderCurrentTool() {
  const main = document.getElementById('mainContent');
  const r = RENDER[currentTool];
  if (!r) return;
  main.innerHTML = `<div class="tool-panel active" id="tool-${currentTool}">${r.html()}</div>`;
  r.bind();
}

// ==================== Init ====================
document.addEventListener('DOMContentLoaded', () => {
  // Lang toggle
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.addEventListener('click', () => setLang(b.dataset.lang));
  });
  setLang(lang);

  // Sidebar click
  document.getElementById('sidebar').addEventListener('click', e => {
    const item = e.target.closest('.sidebar-item');
    if (!item) return;
    const tool = item.dataset.tool;
    if (tool === currentTool) return;
    currentTool = tool;
    localStorage.setItem('devtools-current', tool);
    document.querySelectorAll('.sidebar-item').forEach(s => s.classList.remove('active'));
    item.classList.add('active');
    renderCurrentTool();
  });
});
